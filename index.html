<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rancho dos Amigos | Salão de Festas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #121212;
            --surface: #1E1E1E;
            --text: #EDEDED;
            --text-light: #BBBBBB;
            --accent: #C4A27A;
            --border: #2A2A2A;
            --btn-whats: #25D366;
            --header-bg: rgba(18, 18, 18, 0.95);
            --header-text: #EDEDED;
            --header-hover: #C4A27A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(16px);
            z-index: 1000;
            border-bottom: 1px solid rgba(196, 162, 122, 0.2);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #E8DDD0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }

        nav ul {
            display: flex;
            gap: 28px;
            list-style: none;
            flex-wrap: wrap;
            justify-content: center;
        }

        nav a {
            text-decoration: none;
            font-weight: 500;
            color: var(--header-text);
            transition: 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        nav a:hover {
            color: var(--header-hover);
        }

        main {
            padding-top: 85px;
        }

        .foto-topo {
            width: 100%;
            max-height: 400px;
            overflow: hidden;
            margin-bottom: 0;
        }

        .foto-topo img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            max-height: 400px;
        }

        .hero {
            min-height: 70vh;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            border-radius: 0 0 48px 48px;
            margin-bottom: 60px;
        }

        .hero-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 1.1rem;
            margin-bottom: 35px;
            max-width: 600px;
            opacity: 0.95;
        }

        .btn-whats {
            background: var(--btn-whats);
            padding: 14px 42px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-whats:hover {
            filter: brightness(0.9);
            transform: scale(1.03);
        }

        .secao {
            padding: 70px 0;
            border-bottom: 1px solid var(--border);
        }

        .secao:last-child {
            border-bottom: none;
        }

        .secao-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .secao-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .secao-header p {
            color: var(--text-light);
            max-width: 700px;
            margin: 0 auto;
            font-size: 1rem;
        }

        .grid-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background: var(--surface);
            padding: 35px 25px;
            border-radius: 28px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid var(--border);
        }

        .feature-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
        }

        .feature-card i {
            font-size: 2.8rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .feature-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text);
        }

        .feature-card p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .lista-estrutura {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 16px;
            list-style: none;
        }

        .lista-estrutura li {
            background: var(--surface);
            padding: 16px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            transition: 0.2s;
            color: var(--text);
        }

        .lista-estrutura li:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .lista-estrutura li i {
            color: var(--accent);
            font-size: 1.2rem;
            width: 24px;
        }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 50px;
        }

        .galeria-card {
            background: var(--surface);
            border-radius: 20px;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .galeria-card iframe,
        .galeria-card video,
        .galeria-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        .galeria-card iframe {
            min-height: 220px;
        }

        .galeria-card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .instagram-link {
            text-align: center;
            margin-top: 20px;
        }

        .contato-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .info-card, .mapa-card {
            background: var(--surface);
            padding: 35px;
            border-radius: 28px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .info-card:hover, .mapa-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .info-card {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-card div {
            margin-bottom: 25px;
        }

        .info-card div:last-child {
            margin-bottom: 0;
        }

        .info-card i {
            width: 30px;
            color: var(--accent);
            font-size: 1.2rem;
            margin-right: 8px;
        }

        .info-card a {
            color: var(--accent);
            text-decoration: none;
        }

        .mapa-integrado {
            width: 100%;
            height: 300px;
            border-radius: 20px;
            border: none;
            margin: 15px 0;
        }

        .depoimento-card {
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            transition: 0.3s;
            color: var(--text);
        }

        .depoimento-card:hover {
            transform: translateX(8px);
        }

        footer {
            background: var(--surface);
            color: var(--text-light);
            text-align: center;
            padding: 45px 20px;
            margin-top: 20px;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--btn-whats);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            text-align: center;
            line-height: 60px;
            font-size: 28px;
            color: white;
            z-index: 99;
            transition: 0.3s;
        }

        .whatsapp-float:hover {
            filter: brightness(0.9);
            transform: scale(1.05);
        }

        .btn-topo {
            position: fixed;
            bottom: 100px;
            right: 24px;
            background: var(--accent);
            color: var(--bg);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: none;
            z-index: 99;
            transition: 0.3s;
            font-size: 1.2rem;
        }

        @media (max-width: 900px) {
            header .container {
                flex-direction: column;
                gap: 12px;
                padding: 12px 20px;
            }
            nav ul { gap: 18px; }
            nav a { font-size: 0.85rem; }
            .hero-content h2 { font-size: 2.2rem; }
            .contato-grid { grid-template-columns: 1fr; }
            .container { padding: 0 20px; }
            .secao { padding: 50px 0; }
